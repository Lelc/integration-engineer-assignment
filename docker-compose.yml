services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - laravel

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8000}:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - laravel

    mysql:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-laravel}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_USER: ${DB_USERNAME:-laravel}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
        ports:
            - "${FORWARD_DB_PORT:-3307}:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - laravel
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}" ]
            interval: 5s
            timeout: 5s
            retries: 20

    vite:
        build:
            context: .
            dockerfile: docker/vite.Dockerfile
        working_dir: /var/www/html
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        volumes:
            - ./:/var/www/html
            - node_modules:/var/www/html/node_modules
        ports:
            - "${VITE_PORT:-5173}:5173"
        networks:
            - laravel

    queue:
        build:
            context: .
            dockerfile: Dockerfile
        working_dir: /var/www/html
        command: php artisan queue:work --tries=3 --backoff=5
        restart: unless-stopped
        volumes:
            - ./:/var/www/html
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - laravel

networks:
    laravel:
        driver: bridge

volumes:
    dbdata:
        driver: local
    node_modules:
        driver: local
