info:
  name: Assessments INDEX
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/assessments?page=1&per_page=10&order_by[column]=deadline&order_by[direction]=asc"
  params:
    - name: page
      value: "1"
      type: query
    - name: per_page
      value: "10"
      type: query
    - name: order_by[column]
      value: deadline
      type: query
    - name: order_by[direction]
      value: asc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
